services:
  - type: web
    name: harness-api
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./harness.db
      - key: PYTHON_VERSION
        value: "3.12.0"
